<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typewriter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #f0f0f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevent body scroll, we handle it in the app */
        }

        /* Viewport for the moving carriage */
        .paper-viewport {
            flex: 1;
            width: 100%;
            height: 50vh;
            background: #333; /* Dark background behind the paper */
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            z-index: 1;
        }

        /* The moving carriage holding the paper */
        .carriage {
            position: absolute;
            top: 0;
            left: 50%; /* Center the carriage origin */
            transform: translateX(0);
            transition: transform 0.1s linear; /* Smooth mechanical movement */
            height: 100%;
            display: flex;
            align-items: flex-start;
            padding-top: 40px; /* Space for top of paper */
        }

        /* The actual sheet of paper */
        .paper {
            width: 800px; /* Standard page width approx */
            min-height: 120%; /* Long sheet of paper */
            background: #fefefe;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            padding: 40px 50px; /* Margins on the paper itself */
            position: relative;
            transform: translateY(0); /* For line scrolling */
            transition: transform 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .text-content {
            line-height: 1.5;
            font-size: 18px;
            color: #222;
            white-space: pre; /* Essential for typewriter spacing */
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }

        /* The "Ribbon Guide" - the visual center strike point */
        .ribbon-guide {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 30px;
            border-left: 2px solid silver;
            border-right: 2px solid silver;
            border-top: 2px solid silver;
            border-radius: 5px 5px 0 0;
            z-index: 20;
            pointer-events: none;
        }
        
        .ribbon-guide::after {
             content: '';
             position: absolute;
             top: 5px;
             left: 50%;
             transform: translateX(-50%);
             width: 4px;
             height: 15px;
             background: #red; /* The actual strike alignment mark */
             opacity: 0.5;
        }

        /* Controls positioned absolutely over the viewport */
        .controls-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through to paper if needed */
            z-index: 10;
        }

        .scroll-controls, .file-controls {
            pointer-events: auto; /* Re-enable clicks for buttons */
            position: absolute;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .scroll-controls { top: 20px; right: 20px; }
        .file-controls { top: 20px; left: 20px; }

        .control-btn {
            background: linear-gradient(145deg, #eee, #ddd);
            border: 1px solid #bbb;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-size: 14px;
            color: #333;
            transition: all 0.1s;
        }

        .control-btn:active, .control-btn.active {
            background: #ccc;
            transform: translateY(1px);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Body of the typewriter (below viewport) */
        .typewriter-body {
            flex: 1;
            background: linear-gradient(to bottom, #2E4A3D 0%, #20352b 100%); /* Default Smith-Corona Green/Dark */
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 20px;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.5);
            z-index: 5;
        }

        /* The arc of typebars */
        .basket-container {
            height: 150px;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            overflow: visible; /* Allow bars to fly out */
        }

        .type-bar {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 4px;
            height: 100px;
            background: linear-gradient(to top, #666, #999, #bbb);
            transform-origin: bottom center;
            transition: transform 0.08s ease-out; /* Fast strike */
            border-radius: 2px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            pointer-events: none;
        }
        
        .type-bar::after {
            content: attr(data-char);
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%) rotate(180deg); /* Text faces the basket */
            font-size: 10px;
            color: #ddd;
            font-weight: bold;
        }

        .type-bar.striking {
            z-index: 100;
            /* Animation is handled in JS for dynamic target */
        }

        /* Keyboard Area */
        .keyboard-container {
            background: transparent;
            padding: 10px;
            padding-bottom: 30px;
            position: relative;
        }

        .keyboard {
            max-width: 850px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .key-row {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        /* Smith-Corona 5-Series Key Style */
        .key {
            width: 44px;
            height: 44px;
            border-radius: 50%; /* Classic round keys */
            background: radial-gradient(circle at 30% 30%, #3a5c4d, #20352b); /* Dark Green Key */
            border: 2px solid #1a2b23;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4), inset 0 2px 5px rgba(255,255,255,0.1);
            color: #f0f0f0;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            transition: transform 0.05s;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        .key:active, .key.pressed {
            transform: translateY(4px);
            box-shadow: 0 1px 2px rgba(0,0,0,0.4), inset 0 2px 5px rgba(0,0,0,0.3);
        }

        .key-wide { width: 70px; border-radius: 22px; }
        .space-bar { width: 300px; border-radius: 22px; background: #2E4A3D; } /* Spacebar matches body usually, or key color */

        /* Color Picker for the Body */
        .color-picker {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
        }

        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.5);
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        .color-dot.active {
             transform: scale(1.2);
             border-color: white;
        }

        @media (max-width: 600px) {
            .paper-viewport { height: 40vh; }
            .paper { width: 90vw; padding: 20px; }
            .key { width: 8vw; height: 8vw; font-size: 12px; }
            .key-wide { width: 12vw; }
            .space-bar { width: 40vw; }
            .basket-container { height: 100px; }
            .type-bar { height: 70px; }
        }
    </style>
</head>
<body>
    <div class="paper-viewport">
        <div class="carriage" id="carriage">
            <div class="paper" id="paper">
                <div class="text-content" id="paper-text"></div>
            </div>
        </div>
        <div class="ribbon-guide"></div>
        
        <div class="controls-layer">
            <div class="scroll-controls">
                <button class="control-btn" id="scroll-up" title="Roll Paper Up">▲</button>
                <button class="control-btn" id="scroll-down" title="Roll Paper Down">▼</button>
                <button class="control-btn active" id="sound-toggle" title="Sound On/Off">♪</button>
            </div>
            <div class="file-controls">
                <button class="control-btn" id="save-btn" title="Save">S</button>
                <button class="control-btn" id="new-btn" title="New">N</button>
            </div>
        </div>
    </div>

    <div class="typewriter-body" id="typewriter-body">
        <div class="basket-container" id="type-bars"></div>

        <div class="keyboard-container">
            <div class="keyboard">
                <!-- Row 1 -->
                <div class="key-row">
                    <div class="key" data-key="1">1</div>
                    <div class="key" data-key="2">2</div>
                    <div class="key" data-key="3">3</div>
                    <div class="key" data-key="4">4</div>
                    <div class="key" data-key="5">5</div>
                    <div class="key" data-key="6">6</div>
                    <div class="key" data-key="7">7</div>
                    <div class="key" data-key="8">8</div>
                    <div class="key" data-key="9">9</div>
                    <div class="key" data-key="0">0</div>
                    <div class="key" data-key="-">-</div>
                    <div class="key" data-key="Backspace">←</div>
                </div>
                <!-- Row 2 -->
                <div class="key-row">
                    <div class="key" data-key="q">Q</div>
                    <div class="key" data-key="w">W</div>
                    <div class="key" data-key="e">E</div>
                    <div class="key" data-key="r">R</div>
                    <div class="key" data-key="t">T</div>
                    <div class="key" data-key="y">Y</div>
                    <div class="key" data-key="u">U</div>
                    <div class="key" data-key="i">I</div>
                    <div class="key" data-key="o">O</div>
                    <div class="key" data-key="p">P</div>
                    <div class="key" data-key="@">@</div>
                </div>
                <!-- Row 3 -->
                <div class="key-row">
                    <div class="key" data-key="a">A</div>
                    <div class="key" data-key="s">S</div>
                    <div class="key" data-key="d">D</div>
                    <div class="key" data-key="f">F</div>
                    <div class="key" data-key="g">G</div>
                    <div class="key" data-key="h">H</div>
                    <div class="key" data-key="j">J</div>
                    <div class="key" data-key="k">K</div>
                    <div class="key" data-key="l">L</div>
                    <div class="key" data-key=";">;</div>
                    <div class="key key-wide" data-key="Enter">Ret</div>
                </div>
                <!-- Row 4 -->
                <div class="key-row">
                    <div class="key key-wide" data-key="Shift">Shift</div>
                    <div class="key" data-key="z">Z</div>
                    <div class="key" data-key="x">X</div>
                    <div class="key" data-key="c">C</div>
                    <div class="key" data-key="v">V</div>
                    <div class="key" data-key="b">B</div>
                    <div class="key" data-key="n">N</div>
                    <div class="key" data-key="m">M</div>
                    <div class="key" data-key=",">,</div>
                    <div class="key" data-key=".">.</div>
                    <div class="key key-wide" data-key="Shift">Shift</div>
                </div>
                <!-- Space -->
                <div class="key-row">
                    <div class="key space-bar" data-key=" ">Smith-Corona</div>
                </div>
            </div>
            
            <div class="color-picker">
                <div class="color-dot" style="background: #2E4A3D" data-color="#2E4A3D" title="Classic Green"></div>
                <div class="color-dot" style="background: #AEC6CF" data-color="#AEC6CF" title="Alpine Blue"></div>
                <div class="color-dot" style="background: #F88379" data-color="#F88379" title="Coral Pink"></div>
                <div class="color-dot" style="background: #EDC9AF" data-color="#EDC9AF" title="Desert Sand"></div>
                <div class="color-dot" style="background: #8C92AC" data-color="#8C92AC" title="Sapphire Gray"></div>
            </div>
        </div>
    </div>

    <script>
        // State
        var paperText = '';
        var isShiftPressed = false;
        var soundEnabled = true;
        var audioContext;
        
        // Carriage State
        var charWidth = 0;
        var lineHeight = 0;
        var carriageX = 0; // Current horizontal position in pixels (relative to start)
        var paperY = 0;    // Current vertical scroll position
        var marginBuffer = 50; // Padding inside paper
        
        // DOM Elements
        var paperTextElement = document.getElementById('paper-text');
        var carriageElement = document.getElementById('carriage');
        var paperElement = document.getElementById('paper');
        var typeBarsContainer = document.getElementById('type-bars');
        var typewriterBody = document.getElementById('typewriter-body');
        
        // Controls
        var scrollUpBtn = document.getElementById('scroll-up');
        var scrollDownBtn = document.getElementById('scroll-down');
        var soundToggle = document.getElementById('sound-toggle');
        var saveBtn = document.getElementById('save-btn');
        var newBtn = document.getElementById('new-btn');
        
        // Initialization
        function init() {
            // Measure character dimensions
            var tempSpan = document.createElement('span');
            tempSpan.style.fontFamily = "'Courier New', monospace";
            tempSpan.style.fontSize = "18px";
            tempSpan.style.fontWeight = "bold";
            tempSpan.textContent = "M";
            document.body.appendChild(tempSpan);
            charWidth = tempSpan.getBoundingClientRect().width;
            lineHeight = 18 * 1.5; // Font size * line-height
            document.body.removeChild(tempSpan);
            
            createTypeBars();
            setupEventListeners();
            resetCarriage();
            
            // Initial focus check
            window.addEventListener('click', function() {
                initAudioContext();
            }, { once: true });
        }
        
        function createTypeBars() {
            var chars = ['1', '2', '3', '4', '5', '6', '7', '8', '9', '0', '-', 'q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p', '@', 'a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l', ';', 'z', 'x', 'c', 'v', 'b', 'n', 'm', ',', '.'];
            
            typeBarsContainer.innerHTML = '';
            
            for (var i = 0; i < chars.length; i++) {
                var typeBar = document.createElement('div');
                typeBar.className = 'type-bar';
                typeBar.setAttribute('data-char', chars[i]);
                
                // Calculate arc position: -75 to 75 degrees
                var angle = -75 + (i / (chars.length - 1)) * 150;
                var radius = 120;
                // Position relative to basket bottom center
                var rad = angle * Math.PI / 180;
                var x = Math.sin(rad) * radius;
                var y = Math.cos(rad) * radius; // Upwards
                
                // Adjust for CSS coordinate system (bottom-left origin for transforms usually, but here we center absolute)
                // We want them fanned out.
                typeBar.style.transform = 'rotate(' + angle + 'deg)';
                typeBar.style.bottom = (10) + 'px'; // Base of basket
                // Left offset needs to be calculated to fan them out properly
                // Let's just rotate them from the center bottom
                
                typeBarsContainer.appendChild(typeBar);
            }
        }
        
        function resetCarriage() {
            carriageX = 0;
            updateCarriagePosition();
        }
        
        function updateCarriagePosition() {
            // Move the carriage LEFT as we type (so paper moves left)
            // Initial position: Left edge of paper aligned with center strike point?
            // No, usually start with left margin at strike point.
            // .carriage is centered at 50%.
            // marginBuffer is the left padding of the paper.
            // So at X=0, we want the text to start at marginBuffer.
            // translate = -carriageX + (paperWidth/2 - marginBuffer)? 
            
            // Simpler:
            // Carriage is centered. Paper is inside carriage.
            // Paper has padding-left: 50px.
            // Strike point is at screen center.
            // If carriageX is 0, we want the first char (at 50px inside paper) to be at screen center.
            // The carriage is centered on screen.
            // So inside the carriage, the point x=0 is at screen center.
            // The paper is inside carriage.
            // Let's shift the paper so its left margin is at x=0.
            // We'll handle this by translating the carriage.
            
            // TranslateX moves the carriage.
            // We want to move it LEFT by carriageX.
            // Also need to offset so the margin is at the center.
            // Paper width is 800px.
            // We want the text start (50px in) to be at the center.
            // If carriage is at 0, its left edge is at 50%.
            // Paper is inside.
            // Let's set carriage default: left 50%. 
            // We need to shift it RIGHT so the margin aligns.
            // Shift = Width/2 - PaddingLeft.
            // Actually, let's just use a base offset.
            var baseOffset = 350; // Shift paper to the right so left margin hits center
            carriageElement.style.transform = 'translateX(' + (baseOffset - carriageX) + 'px)';
        }
        
        function typeCharacter(char) {
            initAudioContext();
            
            if (char === 'Backspace') {
                if (paperText.length > 0 && carriageX > 0) {
                    // Check if last char was newline
                    if (paperText.slice(-1) === '\n') {
                        // Complex: would need to go back up line.
                        // Simplified: Just ignore or delete newline char
                         paperText = paperText.slice(0, -1);
                         // Don't move carriage X back if it was a newline, handle Y
                         // For now, simple backspace on line:
                    } else {
                        paperText = paperText.slice(0, -1);
                        carriageX -= charWidth;
                        playSound('backspace');
                    }
                }
            } else if (char === 'Enter') {
                paperText += '\n';
                carriageX = 0;
                paperY -= lineHeight;
                playSound('return');
                animateTypeBar('Ret');
            } else if (char === ' ') {
                paperText += ' ';
                carriageX += charWidth;
                playSound('space');
                animateTypeBar('Space');
            } else {
                // Regular character
                // Handle Shift
                var displayChar = char;
                if (char.length === 1) {
                     if (isShiftPressed) displayChar = char.toUpperCase();
                     // Simplified shift logic for symbols would go here
                }
                
                paperText += displayChar;
                carriageX += charWidth;
                
                // Animation
                // Find nearest typebar or generic
                animateTypeBar(char.toLowerCase());
                
                // Sound
                playSound('type');
            }
            
            // Limit carriage width
            if (carriageX > 700) { // Near right margin
               // Bell sound?
            }
            
            updatePaper();
            updateCarriagePosition();
        }
        
        function updatePaper() {
            paperTextElement.textContent = paperText;
            paperElement.style.transform = 'translateY(' + paperY + 'px)';
        }
        
        function animateTypeBar(char) {
            // Find the bar
            var bar = document.querySelector('.type-bar[data-char="' + char + '"]');
            if (!bar) {
                // Try finding a close match or random for visual effect
                var allBars = document.querySelectorAll('.type-bar');
                bar = allBars[Math.floor(Math.random() * allBars.length)];
            }
            
            // Calculate target position (Ribbon Guide Center)
            // The ribbon guide is fixed at bottom:0, left:50% of viewport.
            // The typebars are in the body below.
            // We need screen coordinates to match them up.
            
            var targetRect = document.querySelector('.ribbon-guide').getBoundingClientRect();
            var barRect = bar.getBoundingClientRect();
            var basketRect = typeBarsContainer.getBoundingClientRect();
            
            // Target point: Center of ribbon guide
            var targetX = targetRect.left + targetRect.width / 2;
            var targetY = targetRect.top + targetRect.height / 2;
            
            // Origin point: Bottom center of the specific type bar
            // Since they are rotated, this is tricky.
            // Let's assume the transform origin (bottom center) is roughly where we want to pivot.
            // Actually, we want to translate/rotate the bar so its TIP hits the target.
            // The bar is 100px tall. Tip is at top.
            // We need to move the bar so its top center aligns with targetX, targetY.
            
            // Current Tip position (roughly, based on rotation)
            // It's easier to just apply a fixed "Strike" transform that overrides the rotation?
            // No, they need to swing IN.
            
            // Visual cheat:
            // 1. Un-rotate the bar.
            // 2. Move it to center.
            // 3. Scale it up.
            
            // Let's just apply a class that sets specific transform values?
            // No, dynamic is better.
            
            // Calculate Delta
            // The bar's origin is at its bottom.
            // We want to rotate it so it points to target.
            // And stretch/move it so it reaches.
            
            // Simplified "Swing to Center" animation:
            // 1. Clone the bar for animation (to avoid disrupting layout? No, absolute is fine).
            // 2. Set z-index high.
            // 3. Transform: rotate(0) translate(to_center) scale(1.2)
            
            // The bars are in .basket-container which is centered.
            // Ribbon guide is centered above it.
            // So X distance is 0 relative to container center?
            // No, bars are fanned out.
            
            // Let's use a class with !important to override the fan rotation
            // But we need to account for their initial position.
            
            // Let's try this:
            // Get the computed rotation.
            var computedStyle = window.getComputedStyle(bar);
            var transform = computedStyle.transform;
            
            bar.classList.add('striking');
            
            // We want to animate TO:
            // rotation: 0 (vertical)
            // translateY: -80px (move up to hit paper)
            // translateZ: 50px (pop out)
            // scale: 1.2
            // But we need to cancel the initial rotation? 
            // If we just set transform, it overrides.
            
            // Ideally:
            // 0% : Current Rotation
            // 50% : Vertical, moving up
            // 100% : Hitting paper
            
            // CSS transition handles interpolation if we just set the new state.
            // New State:
            // We want the TIP to be at the center.
            // Since all bars are centered at bottom:0, left:50%,
            // If we set rotate(0deg) they all point straight up.
            // Then translateY(-something) moves them up.
            // This works for all bars!
            
            bar.style.transform = 'translateY(-110px) scale(1.1) rotate(0deg)';
            
            setTimeout(function() {
                bar.classList.remove('striking');
                // Restore original rotation
                // We need to recalculate or store it.
                // We stored it in the loop or we can recalc based on index?
                // Recalculating is safer.
                var char = bar.getAttribute('data-char');
                var chars = ['1', '2', '3', '4', '5', '6', '7', '8', '9', '0', '-', 'q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p', '@', 'a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l', ';', 'z', 'x', 'c', 'v', 'b', 'n', 'm', ',', '.'];
                var index = -1;
                 // Find index in our list or DOM list
                 var allBars = document.querySelectorAll('.type-bar');
                 for(var i=0; i<allBars.length; i++) {
                     if(allBars[i] === bar) {
                         index = i;
                         break;
                     }
                 }
                 
                 // Re-apply fan
                 if (index !== -1) {
                    var angle = -75 + (index / (allBars.length - 1)) * 150;
                    bar.style.transform = 'rotate(' + angle + 'deg)';
                 }
                 
            }, 100);
        }
        
        function playSound(type) {
            if (!soundEnabled) return;
            initAudioContext();
            
            // Simple synthesizer for mechanical sounds
            var t = audioContext.currentTime;
            var osc = audioContext.createOscillator();
            var gain = audioContext.createGain();
            
            if (type === 'type') {
                // Sharp mechanical click
                osc.frequency.setValueAtTime(800, t);
                osc.frequency.exponentialRampToValueAtTime(100, t + 0.05);
                gain.gain.setValueAtTime(0.3, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
                
                // Add some noise for "thwack"
                var noise = audioContext.createBufferSource();
                var buffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.05, audioContext.sampleRate);
                var data = buffer.getChannelData(0);
                for (var i = 0; i < buffer.length; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                noise.buffer = buffer;
                var noiseGain = audioContext.createGain();
                noiseGain.gain.setValueAtTime(0.5, t);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
                noise.connect(noiseGain);
                noiseGain.connect(audioContext.destination);
                noise.start(t);
                
            } else if (type === 'space') {
                 // Softer thud
                osc.frequency.setValueAtTime(200, t);
                gain.gain.setValueAtTime(0.2, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
            } else if (type === 'return') {
                 // Zip and ding
                 // Zip
                 var noise = audioContext.createBufferSource();
                 var buffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.3, audioContext.sampleRate);
                 var data = buffer.getChannelData(0);
                 for (var i = 0; i < buffer.length; i++) data[i] = Math.random() * 0.5;
                 noise.buffer = buffer;
                 var ng = audioContext.createGain();
                 ng.gain.setValueAtTime(0.2, t);
                 ng.gain.linearRampToValueAtTime(0, t+0.3);
                 noise.connect(ng);
                 ng.connect(audioContext.destination);
                 noise.start(t);
            }
            
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.start(t);
            osc.stop(t + 0.1);
        }
        
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }
        
        function setupEventListeners() {
            // Physical Keyboard
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Shift') isShiftPressed = true;
                
                // Prevent default scrolling
                if (['ArrowUp', 'ArrowDown', 'Space'].includes(e.code)) {
                   // e.preventDefault(); 
                   // Don't prevent default on Space if we are typing, wait...
                }
                
                if (e.metaKey || e.ctrlKey) return;
                
                // Map key to functionality
                // Visual key press
                var keyEl = document.querySelector(`.key[data-key="${e.key}"]`) || 
                            document.querySelector(`.key[data-key="${e.key.toLowerCase()}"]`);
                
                if (keyEl) {
                    keyEl.classList.add('pressed');
                    setTimeout(() => keyEl.classList.remove('pressed'), 100);
                }
                
                if (e.key.length === 1 || e.key === 'Enter' || e.key === 'Backspace') {
                    e.preventDefault();
                    typeCharacter(e.key);
                }
            });
            
            document.addEventListener('keyup', function(e) {
                if (e.key === 'Shift') isShiftPressed = false;
            });
            
            // Virtual Keyboard
            document.querySelectorAll('.key').forEach(k => {
                k.addEventListener('click', function() {
                    var keyVal = this.dataset.key;
                    if (keyVal === 'Shift') {
                        isShiftPressed = !isShiftPressed;
                        this.classList.toggle('active');
                        return;
                    }
                    if (keyVal === 'Ret') keyVal = 'Enter';
                    
                    // Simple animation
                    this.classList.add('pressed');
                    setTimeout(() => this.classList.remove('pressed'), 100);
                    
                    typeCharacter(keyVal);
                });
            });
            
            // Color Picker
            document.querySelectorAll('.color-dot').forEach(d => {
                d.addEventListener('click', function() {
                    var color = this.dataset.color;
                    typewriterBody.style.background = `linear-gradient(to bottom, ${color} 0%, #333 100%)`;
                    // Update spacebar too
                    document.querySelector('.space-bar').style.background = color;
                });
            });
            
            // Scroll Controls
            scrollUpBtn.addEventListener('click', () => {
                paperY += 20;
                updatePaper();
            });
            scrollDownBtn.addEventListener('click', () => {
                paperY -= 20;
                updatePaper();
            });
            
            soundToggle.addEventListener('click', () => {
                soundEnabled = !soundEnabled;
                soundToggle.classList.toggle('active');
            });
        }

        // Run
        init();
    </script>
</body>
</html>
